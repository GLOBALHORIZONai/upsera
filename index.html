  :root, :root[data-theme="dark"]{

    --primary:#7AA3FF; --accent:#2BEDB8; --gold:#FFC96B; --rose:#FF8AA3;

  /* Light theme */

    --ink:#F4F7FE; --surface:#FFFFFF; --surfaceHi:#EEF3FC; --line:#D9E1F2;

    --headerBg:rgba(244,247,254,.9);

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s ease,color .3s ease}
  body{font-family:'Inter',system-ui,sans-serif}
  body.rtl{font-family:'Tajawal',system-ui,sans-serif}
  ::selection{background:var(--primary);color:#fff}
  button{font-family:inherit;cursor:pointer}
  input,textarea{font-family:inherit}
  .mono{font-family:'Space Grotesk',sans-serif}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes wave{0%,100%{height:8px}50%{height:22px}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .rise{animation:rise .55s cubic-bezier(.2,.7,.3,1) both}
  .fade{animation:fadeIn .4s ease both}
  .slideUp{animation:slideUp .4s cubic-bezier(.2,.7,.3,1) both}
  button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .pathcard{transition:transform .25s cubic-bezier(.2,.7,.3,1),border-color .25s}
  .pathcard:hover{transform:translateY(-3px)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

// hex+alpha helper: returns rgba() from a raw theme color key + 2-digit alpha hex
function withA(rawColors, key, alphaHex){
  const hex = rawColors[key] || "#000000";
  const a = parseInt(alphaHex,16)/255;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}
